name: unit testing and SAST
on: [push, workflow_dispatch]

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: SAST scan with Grype
        uses: anchore/scan-action@v7
        id: scan
        with:
          path: "${{ github.workspace }}"  # path to the checked-out repository
          fail-build: false
          severity-cutoff: high

      - name: upload vulnerability scan
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build with Gradle Wrapper (which requires passing all tests)
        run: |
          chmod +x gradlew
          ./gradlew build
  
